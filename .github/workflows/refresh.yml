name: Refresh live data

on:
  schedule:
    # 11:30 UTC = 7:30 AM EDT / 6:30 AM EST, Mon-Fri
    - cron: '30 11 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-live-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install openpyxl (for workbook rebuild)
        run: pip install openpyxl

      - name: Run refresh (writes data/{cid}/livedata.json + .csv)
        run: python refresh.py

      - name: Rebuild published workbooks from templates
        run: python build_published_workbook.py

      - name: Commit refreshed data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Refresh live data $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-logs-${{ github.run_id }}
          path: logs/
          if-no-files-found: ignore
          retention-days: 14
